<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Card Scanner">
<title>Card Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #141418;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    color: #e8e8e8;
    gap: 1.25rem;
  }
  h1 { font-size: 28px; font-weight: 600; color: #e8e8e8; }
  .subtitle { font-size: 17px; color: #666; margin-bottom: 0.5rem; }
  .upload-area {
    width: 100%; max-width: 420px;
    border: 1.5px dashed #333; border-radius: 20px;
    background: #1e1e24; padding: 2.25rem 1.5rem;
    display: flex; flex-direction: column; align-items: center; gap: 1.1rem;
    cursor: pointer;
  }
  .upload-icon {
    width: 68px; height: 68px; background: #2a2740; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .upload-icon svg { width: 34px; height: 34px; }
  .upload-label { font-size: 18px; font-weight: 500; text-align: center; color: #e8e8e8; }
  .upload-hint { font-size: 15px; color: #666; text-align: center; }
  #file-input { display: none; }
  .preview-img {
    width: 100%; max-width: 420px; border-radius: 14px;
    max-height: 240px; object-fit: contain;
    border: 0.5px solid #2a2a32; background: #1e1e24; display: none;
  }
  .scan-btn {
    width: 100%; max-width: 420px; padding: 18px;
    background: #6C63D5; color: #fff; border: none; border-radius: 14px;
    font-size: 19px; font-weight: 600; cursor: pointer; display: none;
    min-height: 60px;
  }
  .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { font-size: 16px; color: #8880CC; min-height: 22px; text-align: center; }
  .error-msg {
    width: 100%; max-width: 420px;
    background: #2d1a1a; color: #e07070;
    border-radius: 12px; padding: 14px 16px; font-size: 16px; display: none;
  }

  /* QR choice modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; padding: 1rem;
  }
  .modal-overlay.hidden { display: none; }
  .modal-sheet {
    background: #1e1e24; border-radius: 22px;
    border: 0.5px solid #2a2a36;
    width: 100%; max-width: 420px;
    padding: 1.75rem; display: flex; flex-direction: column; gap: 14px;
  }
  .modal-title { font-size: 20px; font-weight: 700; text-align: center; color: #e8e8e8; }
  .modal-subtitle { font-size: 15px; color: #666; text-align: center; margin-top: -6px; }
  .modal-btn {
    width: 100%; padding: 17px; border-radius: 14px;
    font-size: 17px; font-weight: 600; cursor: pointer; border: none;
    min-height: 58px;
  }
  .modal-btn.primary { background: #6C63D5; color: #fff; }
  .modal-btn.secondary { background: #2a2a36; color: #e8e8e8; }
  .modal-btn.cancel { background: transparent; color: #666; font-size: 16px; min-height: 48px; }

  .result-card {
    width: 100%; max-width: 420px; background: #1e1e24;
    border: 0.5px solid #2a2a36; border-radius: 20px;
    padding: 1.5rem; display: none;
  }
  .result-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .avatar {
    width: 58px; height: 58px; border-radius: 50%;
    background: #2a2740; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; color: #9D97E8; flex-shrink: 0;
  }
  .result-name { font-size: 20px; font-weight: 600; color: #e8e8e8; }
  .result-title { font-size: 15px; color: #666; margin-top: 3px; }
  .result-company { font-size: 15px; color: #8880CC; margin-top: 3px; }
  .divider { border: none; border-top: 0.5px solid #2a2a36; margin: 14px 0; }
  .field-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; font-size: 16px;
  }
  .field-label { color: #666; flex-shrink: 0; margin-right: 12px; font-size: 15px; }
  .field-value { color: #e8e8e8; text-align: right; word-break: break-all; font-size: 16px; }
  .field-value a { color: #8880CC; text-decoration: none; }
  .action-row { display: flex; gap: 12px; margin-top: 18px; }
  .action-btn {
    flex: 1; padding: 14px 10px; border-radius: 12px; font-size: 16px; font-weight: 600;
    border: 0.5px solid #2a2a36; background: #2a2a36; cursor: pointer; color: #e8e8e8;
    min-height: 54px;
  }
  .action-btn.primary { background: #6C63D5; color: #fff; border-color: #6C63D5; }
  .action-btn.wide {
    width: 100%; margin-top: 10px; flex: unset;
  }
  .reset-btn {
    width: 100%; max-width: 420px; padding: 15px;
    background: transparent; color: #555; border: 0.5px solid #2a2a36;
    border-radius: 14px; font-size: 16px; cursor: pointer; display: none;
    min-height: 54px;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>

<h1>Card Scanner</h1>
<p class="subtitle">Scan a business card or QR code</p>

<div class="upload-area" id="upload-area">
  <div class="upload-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#8880CC" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
  </div>
  <div class="upload-label">Tap to select an image</div>
  <div class="upload-hint">Business card or QR code</div>
  <div style="display:flex;gap:12px;margin-top:6px;width:100%;">
    <button class="action-btn" style="flex:1;" onclick="document.getElementById('file-camera').click()">Take photo</button>
    <button class="action-btn" style="flex:1;" onclick="document.getElementById('file-library').click()">Choose image</button>
  </div>
  <input type="file" id="file-camera" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="file-library" accept="image/*" style="display:none">
</div>

<img id="preview" class="preview-img" alt="Card preview">
<p class="status" id="status"></p>
<button class="scan-btn" id="scan-btn">Scan card</button>
<div class="error-msg" id="error-msg"></div>

<!-- QR choice modal -->
<div class="modal-overlay hidden" id="qr-modal">
  <div class="modal-sheet">
    <div class="modal-title">QR Code Detected</div>
    <div class="modal-subtitle">How would you like to scan this card?</div>
    <button class="modal-btn primary" id="modal-use-qr">Scan QR code</button>
    <button class="modal-btn secondary" id="modal-use-text">Read printed text</button>
    <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
  </div>
</div>

<div class="result-card" id="result-card">
  <div class="result-header">
    <div class="avatar" id="avatar">?</div>
    <div>
      <div class="result-name" id="res-name"></div>
      <div class="result-title" id="res-title"></div>
      <div class="result-company" id="res-company"></div>
    </div>
  </div>
  <hr class="divider">
  <div id="fields"></div>
  <div class="action-row">
    <button class="action-btn" onclick="copyContact()">Copy JSON</button>
    <button class="action-btn primary" onclick="downloadVCard()">Save contact</button>
  </div>
  <button class="action-btn wide" onclick="findOnLinkedIn()">Find on LinkedIn</button>
</div>

<button class="reset-btn" id="reset-btn" onclick="reset()">Scan another card</button>

<script>
const API = 'https://bcsv2-production.up.railway.app';
let currentData = null;
let pendingQRText = null;
let pendingBase64 = null;
let pendingMediaType = null;

const preview = document.getElementById('preview');
const scanBtn = document.getElementById('scan-btn');
const status = document.getElementById('status');
const resultCard = document.getElementById('result-card');
const resetBtn = document.getElementById('reset-btn');
const errorMsg = document.getElementById('error-msg');
const uploadArea = document.getElementById('upload-area');
const qrModal = document.getElementById('qr-modal');
let selectedFile = null;

document.getElementById('modal-use-qr').addEventListener('click', () => {
  hideModal();
  if (!pendingQRText) return;
  const parsed = parseQRText(pendingQRText);
  if (parsed) {
    currentData = parsed;
    showResult(parsed);
  } else {
    showError('Could not extract contact info from QR code.');
  }
  scanBtn.disabled = false;
});

document.getElementById('modal-use-text').addEventListener('click', async () => {
  hideModal();
  await scanViaAPI(pendingBase64, pendingMediaType);
  scanBtn.disabled = false;
});

document.getElementById('modal-cancel').addEventListener('click', () => {
  hideModal();
  status.textContent = '';
  scanBtn.disabled = false;
});

function showModal() { qrModal.classList.remove('hidden'); }
function hideModal() { qrModal.classList.add('hidden'); }

function handleFileSelect(file) {
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadArea.style.display = 'none';
      scanBtn.style.display = 'block';
      status.textContent = 'Ready to scan';
      errorMsg.style.display = 'none';
      resultCard.style.display = 'none';
      resetBtn.style.display = 'none';
    };
    img.onerror = () => { status.textContent = 'Could not load image, try again.'; };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('file-camera').addEventListener('change', e => handleFileSelect(e.target.files[0]));
document.getElementById('file-library').addEventListener('change', e => handleFileSelect(e.target.files[0]));

function compressImage(file, maxWidth = 1200) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const scale = Math.min(1, maxWidth / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        resolve({ base64: dataUrl.split(',')[1], mediaType: 'image/jpeg', canvas, scale });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function tryDecodeQR(canvas) {
  try {
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    return code ? code.data : null;
  } catch(e) { return null; }
}

function parseQRText(text) {
  const result = { name: '', title: '', company: '', email: '', phone: '', website: '' };
  if (text.startsWith('BEGIN:VCARD')) {
    text.split(/\r?\n/).forEach(line => {
      if (line.startsWith('FN:')) result.name = line.slice(3);
      else if (line.startsWith('ORG:')) result.company = line.slice(4);
      else if (line.startsWith('TITLE:')) result.title = line.slice(6);
      else if (line.startsWith('EMAIL')) result.email = line.split(':').slice(1).join(':');
      else if (line.startsWith('TEL')) result.phone = line.split(':').slice(1).join(':');
      else if (line.startsWith('URL')) result.website = line.split(':').slice(1).join(':');
    });
    return result;
  }
  if (text.startsWith('http')) { result.website = text; return result; }
  return null;
}

async function scanViaAPI(base64, mediaType) {
  status.textContent = 'Scanning...';
  try {
    const res = await fetch(`${API}/read-card`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ base64, mediaType })
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    currentData = data;
    showResult(data);
  } catch (err) {
    showError('Error: ' + err.message);
  }
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
  status.textContent = '';
}

scanBtn.addEventListener('click', async () => {
  const file = selectedFile;
  if (!file) return;

  scanBtn.disabled = true;
  status.textContent = 'Compressing image...';
  errorMsg.style.display = 'none';

  try {
    const { base64, mediaType, canvas } = await compressImage(file);
    pendingBase64 = base64;
    pendingMediaType = mediaType;

    const qrText = tryDecodeQR(canvas);
    if (qrText) {
      pendingQRText = qrText;
      status.textContent = '';
      showModal();
      return;
    }

    await scanViaAPI(base64, mediaType);
  } catch (err) {
    showError('Error: ' + err.message);
  } finally {
    if (qrModal.classList.contains('hidden')) {
      scanBtn.disabled = false;
    }
  }
});

function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

function showResult(d) {
  status.textContent = '';
  scanBtn.style.display = 'none';
  document.getElementById('avatar').textContent = initials(d.name);
  document.getElementById('res-name').textContent = d.name || '—';
  document.getElementById('res-title').textContent = d.title || '';
  document.getElementById('res-company').textContent = d.company || '';

  const fields = [];
  if (d.email) fields.push({ label: 'Email', value: `<a href="mailto:${d.email}">${d.email}</a>` });
  if (d.phone) fields.push({ label: 'Phone', value: `<a href="tel:${d.phone}">${d.phone}</a>` });
  if (d.website) {
    const url = d.website.startsWith('http') ? d.website : 'https://' + d.website;
    fields.push({ label: 'Website', value: `<a href="${url}" target="_blank">${d.website}</a>` });
  }

  document.getElementById('fields').innerHTML = fields.map(f =>
    `<div class="field-row"><span class="field-label">${f.label}</span><span class="field-value">${f.value}</span></div>`
  ).join('');

  resultCard.style.display = 'block';
  resetBtn.style.display = 'block';
}

function findOnLinkedIn() {
  if (!currentData) return;
  const query = [currentData.name, currentData.company].filter(Boolean).join(' ');
  window.open('https://www.linkedin.com/search/results/people/?keywords=' + encodeURIComponent(query), '_blank');
}

function copyContact() {
  if (!currentData) return;
  navigator.clipboard.writeText(JSON.stringify(currentData, null, 2));
}

function downloadVCard() {
  if (!currentData) return;
  const d = currentData;
  const lines = [
    'BEGIN:VCARD', 'VERSION:3.0',
    `FN:${d.name || ''}`,
    d.title ? `TITLE:${d.title}` : '',
    d.company ? `ORG:${d.company}` : '',
    d.email ? `EMAIL:${d.email}` : '',
    d.phone ? `TEL:${d.phone}` : '',
    d.website ? `URL:${d.website.startsWith('http') ? d.website : 'https://' + d.website}` : '',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([lines], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(d.name || 'contact').replace(/\s+/g, '_')}.vcf`;
  a.click();
  URL.revokeObjectURL(url);
}

function reset() {
  selectedFile = null;
  pendingQRText = null;
  pendingBase64 = null;
  pendingMediaType = null;
  document.getElementById('file-camera').value = '';
  document.getElementById('file-library').value = '';
  preview.style.display = 'none';
  uploadArea.style.display = 'flex';
  scanBtn.style.display = 'none';
  resultCard.style.display = 'none';
  resetBtn.style.display = 'none';
  errorMsg.style.display = 'none';
  status.textContent = '';
  currentData = null;
}
</script>
</body>
</html>
