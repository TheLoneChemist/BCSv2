<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Card Scanner">
<title>Card Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
    color: #1a1a1a;
    gap: 1rem;
  }
  h1 { font-size: 22px; font-weight: 500; color: #1a1a1a; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 1rem; }
  .upload-area {
    width: 100%; max-width: 420px;
    border: 1.5px dashed #ccc; border-radius: 16px;
    background: #fff; padding: 2rem 1.5rem;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    cursor: pointer;
  }
  .upload-icon {
    width: 56px; height: 56px; background: #EEEDFE; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .upload-icon svg { width: 28px; height: 28px; }
  .upload-label { font-size: 15px; font-weight: 500; text-align: center; }
  .upload-hint { font-size: 13px; color: #888; text-align: center; }
  #file-input { display: none; }
  .preview-img {
    width: 100%; max-width: 420px; border-radius: 12px;
    max-height: 220px; object-fit: contain;
    border: 0.5px solid #e0e0e0; background: #fff; display: none;
  }
  .scan-btn {
    width: 100%; max-width: 420px; padding: 14px;
    background: #534AB7; color: #fff; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 500; cursor: pointer; display: none;
  }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { font-size: 14px; color: #534AB7; min-height: 20px; text-align: center; }
  .error-msg {
    width: 100%; max-width: 420px;
    background: #FCEBEB; color: #A32D2D;
    border-radius: 10px; padding: 12px 14px; font-size: 14px; display: none;
  }
  .result-card {
    width: 100%; max-width: 420px; background: #fff;
    border: 0.5px solid #e0e0e0; border-radius: 16px;
    padding: 1.25rem; display: none;
  }
  .result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: #EEEDFE; display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 500; color: #534AB7; flex-shrink: 0;
  }
  .result-name { font-size: 17px; font-weight: 500; }
  .result-title { font-size: 13px; color: #888; margin-top: 2px; }
  .result-company { font-size: 13px; color: #534AB7; margin-top: 2px; }
  .divider { border: none; border-top: 0.5px solid #eee; margin: 12px 0; }
  .field-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 14px; }
  .field-label { color: #888; flex-shrink: 0; margin-right: 12px; }
  .field-value { color: #1a1a1a; text-align: right; word-break: break-all; }
  .field-value a { color: #534AB7; text-decoration: none; }
  .action-row { display: flex; gap: 10px; margin-top: 16px; }
  .action-btn {
    flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 500;
    border: 0.5px solid #e0e0e0; background: #f5f5f0; cursor: pointer; color: #1a1a1a;
  }
  .action-btn.primary { background: #534AB7; color: #fff; border-color: #534AB7; }
  .reset-btn {
    width: 100%; max-width: 420px; padding: 12px;
    background: transparent; color: #888; border: 0.5px solid #ddd;
    border-radius: 12px; font-size: 14px; cursor: pointer; display: none;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>

<h1>Card Scanner</h1>
<p class="subtitle">Scan a business card or QR code</p>

<label class="upload-area" id="upload-area" for="file-input">
  <div class="upload-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
  </div>
  <div class="upload-label">Take a photo or choose image</div>
  <div class="upload-hint">Business card or QR code</div>
  <input type="file" id="file-input" accept="image/*" capture="environment">
</label>

<img id="preview" class="preview-img" alt="Card preview">
<p class="status" id="status"></p>
<button class="scan-btn" id="scan-btn">Scan card</button>
<div class="error-msg" id="error-msg"></div>

<div class="result-card" id="result-card">
  <div class="result-header">
    <div class="avatar" id="avatar">?</div>
    <div>
      <div class="result-name" id="res-name"></div>
      <div class="result-title" id="res-title"></div>
      <div class="result-company" id="res-company"></div>
    </div>
  </div>
  <hr class="divider">
  <div id="fields"></div>
  <div class="action-row">
    <button class="action-btn" onclick="copyContact()">Copy JSON</button>
    <button class="action-btn primary" onclick="downloadVCard()">Save contact</button>
  </div>
  <button class="action-btn" style="width:100%;margin-top:8px;" onclick="findOnLinkedIn()">Find on LinkedIn</button>
</div>

<button class="reset-btn" id="reset-btn" onclick="reset()">Scan another card</button>

<script>
const API = 'https://bcsv2-production.up.railway.app';
let currentData = null;

const fileInput = document.getElementById('file-input');
const preview = document.getElementById('preview');
const scanBtn = document.getElementById('scan-btn');
const status = document.getElementById('status');
const resultCard = document.getElementById('result-card');
const resetBtn = document.getElementById('reset-btn');
const errorMsg = document.getElementById('error-msg');
const uploadArea = document.getElementById('upload-area');

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadArea.style.display = 'none';
      scanBtn.style.display = 'block';
      status.textContent = 'Ready to scan';
      errorMsg.style.display = 'none';
      resultCard.style.display = 'none';
      resetBtn.style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

function compressImage(file, maxWidth = 1200) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const scale = Math.min(1, maxWidth / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        resolve({ base64: dataUrl.split(',')[1], mediaType: 'image/jpeg', canvas, scale });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function tryDecodeQR(canvas) {
  try {
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    return code ? code.data : null;
  } catch(e) { return null; }
}

function parseQRText(text) {
  const result = { name: '', title: '', company: '', email: '', phone: '', website: '' };
  if (text.startsWith('BEGIN:VCARD')) {
    text.split(/
?
/).forEach(line => {
      if (line.startsWith('FN:')) result.name = line.slice(3);
      else if (line.startsWith('ORG:')) result.company = line.slice(4);
      else if (line.startsWith('TITLE:')) result.title = line.slice(6);
      else if (line.startsWith('EMAIL')) result.email = line.split(':').slice(1).join(':');
      else if (line.startsWith('TEL')) result.phone = line.split(':').slice(1).join(':');
      else if (line.startsWith('URL')) result.website = line.split(':').slice(1).join(':');
    });
    return result;
  }
  if (text.startsWith('http')) { result.website = text; return result; }
  return null;
}

scanBtn.addEventListener('click', async () => {
  const file = fileInput.files[0];
  if (!file) return;

  scanBtn.disabled = true;
  status.textContent = 'Compressing image...';
  errorMsg.style.display = 'none';

  try {
    const { base64, mediaType, canvas } = await compressImage(file);

    const qrText = tryDecodeQR(canvas);
    if (qrText) {
      const parsed = parseQRText(qrText);
      if (parsed) {
        currentData = parsed;
        showResult(parsed);
        scanBtn.disabled = false;
        return;
      }
    }

    status.textContent = 'Scanning...';

    const res = await fetch(`${API}/read-card`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ base64, mediaType })
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    currentData = data;
    showResult(data);
  } catch (err) {
    errorMsg.textContent = 'Error: ' + err.message;
    errorMsg.style.display = 'block';
    status.textContent = '';
  } finally {
    scanBtn.disabled = false;
  }
});

function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

function showResult(d) {
  status.textContent = '';
  scanBtn.style.display = 'none';
  document.getElementById('avatar').textContent = initials(d.name);
  document.getElementById('res-name').textContent = d.name || '—';
  document.getElementById('res-title').textContent = d.title || '';
  document.getElementById('res-company').textContent = d.company || '';

  const fields = [];
  if (d.email) fields.push({ label: 'Email', value: `<a href="mailto:${d.email}">${d.email}</a>` });
  if (d.phone) fields.push({ label: 'Phone', value: `<a href="tel:${d.phone}">${d.phone}</a>` });
  if (d.website) {
    const url = d.website.startsWith('http') ? d.website : 'https://' + d.website;
    fields.push({ label: 'Website', value: `<a href="${url}" target="_blank">${d.website}</a>` });
  }

  document.getElementById('fields').innerHTML = fields.map(f =>
    `<div class="field-row"><span class="field-label">${f.label}</span><span class="field-value">${f.value}</span></div>`
  ).join('');

  resultCard.style.display = 'block';
  resetBtn.style.display = 'block';
}

function findOnLinkedIn() {
  if (!currentData) return;
  const query = [currentData.name, currentData.company].filter(Boolean).join(' ');
  window.open('https://www.linkedin.com/search/results/people/?keywords=' + encodeURIComponent(query), '_blank');
}

function copyContact() {
  if (!currentData) return;
  navigator.clipboard.writeText(JSON.stringify(currentData, null, 2));
}

function downloadVCard() {
  if (!currentData) return;
  const d = currentData;
  const lines = [
    'BEGIN:VCARD', 'VERSION:3.0',
    `FN:${d.name || ''}`,
    d.title ? `TITLE:${d.title}` : '',
    d.company ? `ORG:${d.company}` : '',
    d.email ? `EMAIL:${d.email}` : '',
    d.phone ? `TEL:${d.phone}` : '',
    d.website ? `URL:${d.website.startsWith('http') ? d.website : 'https://' + d.website}` : '',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([lines], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(d.name || 'contact').replace(/\s+/g, '_')}.vcf`;
  a.click();
  URL.revokeObjectURL(url);
}

function reset() {
  fileInput.value = '';
  preview.style.display = 'none';
  uploadArea.style.display = 'flex';
  scanBtn.style.display = 'none';
  resultCard.style.display = 'none';
  resetBtn.style.display = 'none';
  errorMsg.style.display = 'none';
  status.textContent = '';
  currentData = null;
}
</script>
</body>
</html>
