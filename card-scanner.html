<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Card Scanner">
<title>Card Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0C0C12;
    --surface:   #181824;
    --surface2:  #1f1f2e;
    --border:    #2a2a3d;
    --border2:   #353550;
    --accent:    #5A4FCF;
    --accent2:   #AFA8FF;
    --muted:     #9FA3B0;
    --text:      #F1F1F5;
    --text2:     #9FA3B0;
    --danger:    #c06060;
    --success:   #7ED7C1;
    --radius:    16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 5rem;
    color: var(--text);
    gap: 1.25rem;
  }

  /* Subtle grain texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.6;
  }
  body > * { position: relative; z-index: 1; }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 30px; font-weight: 400;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .subtitle { font-size: 15px; color: var(--muted); margin-bottom: 0.25rem; }

  /* Upload */
  .upload-area {
    width: 100%; max-width: 440px;
    border: 1.5px dashed var(--border2); border-radius: 20px;
    background: var(--surface); padding: 2rem 1.5rem;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
  }
  .upload-icon {
    width: 64px; height: 64px; background: var(--surface2); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
  }  .upload-icon svg { width: 30px; height: 30px; }
  .upload-label { font-size: 17px; font-weight: 500; text-align: center; }
  .upload-hint { font-size: 14px; color: var(--muted); text-align: center; }

  .preview-img {
    width: 100%; max-width: 440px; border-radius: var(--radius);
    max-height: 240px; object-fit: contain;
    border: 1px solid var(--border); background: var(--surface); display: none;
  }
  .scan-btn {
    width: 100%; max-width: 440px; padding: 17px;
    background: var(--accent); color: #F1F1F5; border: none; border-radius: var(--radius);
    font-size: 17px; font-weight: 600; cursor: pointer; display: none;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.18s;
  }
  .scan-btn:hover { background: var(--accent2); color: #0C0C12; }
  .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status { font-size: 15px; color: var(--accent2); min-height: 20px; text-align: center; }
  .error-msg {
    width: 100%; max-width: 440px;
    background: #2d1a1a; color: var(--danger);
    border-radius: var(--radius-sm); padding: 13px 16px; font-size: 15px; display: none;
    border: 1px solid #4a2020;
  }

  /* Modals */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,8,6,0.82);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; padding: 1rem;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }
  .modal-sheet {
    background: var(--surface); border-radius: 22px;
    border: 1px solid var(--border);
    width: 100%; max-width: 440px;
    padding: 1.75rem; display: flex; flex-direction: column; gap: 12px;
    max-height: 90dvh; overflow-y: auto;
  }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; text-align: center; }
  .modal-subtitle { font-size: 14px; color: var(--muted); text-align: center; margin-top: -4px; }

  /* Buttons */
  .modal-btn, .action-btn, .scan-btn, .reset-btn {
    font-family: 'DM Sans', sans-serif;
  }
  .modal-btn {
    width: 100%; padding: 15px; border-radius: var(--radius);
    font-size: 16px; font-weight: 600; cursor: pointer; border: none;
    min-height: 52px; transition: opacity 0.15s, background 0.15s;
  }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn.primary { background: var(--accent); color: #F1F1F5; }
  .modal-btn.primary:hover { background: var(--accent2); color: #0C0C12; }
  .modal-btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .modal-btn.cancel { background: transparent; color: var(--muted); font-size: 15px; min-height: 44px; }

  /* Result card */
  .result-card {
    width: 100%; max-width: 440px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 1.5rem; display: none; gap: 0;
    flex-direction: column;
  }
  .result-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .avatar {
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 18px; color: var(--accent2); flex-shrink: 0;
  }
  .result-name { font-size: 19px; font-weight: 600; }
  .result-title { font-size: 14px; color: var(--muted); margin-top: 2px; }
  .result-company { font-size: 14px; color: var(--success); margin-top: 2px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .field-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; font-size: 15px; border-bottom: 1px solid var(--border);
  }
  .field-row:last-child { border-bottom: none; }
  .field-label { color: var(--muted); flex-shrink: 0; margin-right: 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field-value { color: var(--text); text-align: right; word-break: break-all; }
  .field-value a { color: var(--accent2); text-decoration: none; }

  .action-row { display: flex; gap: 10px; margin-top: 16px; }
  .action-btn {
    flex: 1; padding: 13px 10px; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; color: var(--text); min-height: 50px;
    transition: background 0.15s, border-color 0.15s;
  }
  .action-btn:hover { background: var(--border); }
  .action-btn.primary { background: var(--accent); color: #F1F1F5; border-color: var(--accent); }
  .action-btn.primary:hover { background: var(--accent2); color: #0C0C12; }
  .action-btn.wide { width: 100%; margin-top: 8px; flex: unset; }
  .action-btn.highlight { background: var(--surface2); border-color: var(--accent2); color: var(--accent2); }
  .action-btn.highlight:hover { background: var(--border); }

  .reset-btn {
    width: 100%; max-width: 440px; padding: 14px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 15px; cursor: pointer; display: none; min-height: 50px;
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: var(--border2); color: var(--text2); }

  /* Notes & Follow-up section inside result card */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px; font-weight: 400;
    color: var(--text2); margin: 14px 0 8px;
    display: flex; align-items: center; gap: 7px;
  }
  .section-title svg { width: 16px; height: 16px; }

  textarea.notes-field {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 12px; resize: vertical; min-height: 88px;
    outline: none; transition: border-color 0.15s;
    line-height: 1.55;
  }
  textarea.notes-field::placeholder { color: var(--muted); }
  textarea.notes-field:focus { border-color: var(--accent); }

  /* Calendar section */
  .cal-row {
    display: flex; gap: 10px; margin-top: 4px;
  }
  .cal-field {
    flex: 1; display: flex; flex-direction: column; gap: 5px;
  }
  .cal-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  input[type="date"], input[type="time"] {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 10px 12px; width: 100%; outline: none;
    transition: border-color 0.15s;
    color-scheme: dark;
  }
  input[type="date"]:focus, input[type="time"]:focus { border-color: var(--accent); }

  /* Invite toggle */
  .invite-options { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .invite-chip {
    padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; color: var(--text2); transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .invite-chip.active { background: var(--accent); color: #F1F1F5; border-color: var(--accent); font-weight: 600; }
  .invite-chip:hover:not(.active) { border-color: var(--border2); }

  /* Email draft modal */
  .email-draft {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px;
    font-size: 14px; color: var(--text2); line-height: 1.6;
    white-space: pre-wrap; max-height: 280px; overflow-y: auto;
    margin-top: 6px;
  }
  .generating-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--accent2); padding: 4px 0;
  }
  .dot-spin {
    width: 8px; height: 8px; border-radius: 50%;
    border: 2px solid var(--accent2);
    border-top-color: transparent;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border2); border-radius: 30px;
    padding: 10px 20px; font-size: 14px; opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 200; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Section separator */
  .section-sep {
    border: none; border-top: 1px solid var(--border);
    margin: 16px 0 4px;
  }

  /* Success color override for calendar button after creation */
  .cal-created { border-color: var(--success) !important; color: var(--success) !important; background: transparent !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>

<h1>Card Scanner</h1>
<p class="subtitle">Scan a business card or QR code</p>

<div class="upload-area" id="upload-area">
  <div class="upload-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#AFA8FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
  </div>
  <div class="upload-label">Select a card image</div>
  <div class="upload-hint">Business card or QR code</div>
  <div style="display:flex;gap:10px;margin-top:6px;width:100%;">
    <button class="action-btn" style="flex:1;" onclick="document.getElementById('file-camera').click()">📷 Take photo</button>
    <button class="action-btn" style="flex:1;" onclick="document.getElementById('file-library').click()">🖼 Choose image</button>
  </div>
  <input type="file" id="file-camera" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="file-library" accept="image/*" style="display:none">
</div>

<img id="preview" class="preview-img" alt="Card preview">
<p class="status" id="status"></p>
<button class="scan-btn" id="scan-btn">Scan card</button>
<div class="error-msg" id="error-msg"></div>

<!-- QR choice modal -->
<div class="modal-overlay hidden" id="qr-modal">
  <div class="modal-sheet">
    <div class="modal-title">QR Code Detected</div>
    <div class="modal-subtitle">How would you like to scan this card?</div>
    <button class="modal-btn primary" id="modal-use-qr">Scan QR code</button>
    <button class="modal-btn secondary" id="modal-use-text">Read printed text</button>
    <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
  </div>
</div>

<!-- Email draft modal -->
<div class="modal-overlay hidden" id="email-modal">
  <div class="modal-sheet">
    <div class="modal-title">✉️ Suggested Follow-up</div>
    <div class="modal-subtitle">Generated from your conversation notes</div>
    <div class="email-draft" id="email-draft-content"></div>
    <button class="modal-btn primary" onclick="copyEmailDraft()">Copy email draft</button>
    <button class="modal-btn cancel" onclick="document.getElementById('email-modal').classList.add('hidden')">Close</button>
  </div>
</div>

<!-- Result card -->
<div class="result-card" id="result-card">
  <div class="result-header">
    <div class="avatar" id="avatar">?</div>
    <div>
      <div class="result-name" id="res-name"></div>
      <div class="result-title" id="res-title"></div>
      <div class="result-company" id="res-company"></div>
    </div>
  </div>
  <hr class="divider">
  <div id="fields"></div>

  <!-- Actions -->
  <div class="action-row">
    <button class="action-btn" onclick="copyContact()">Copy JSON</button>
    <button class="action-btn primary" onclick="downloadVCard()">Save contact</button>
  </div>
  <button class="action-btn wide" onclick="findOnLinkedIn()">Find on LinkedIn</button>

  <!-- Notes -->
  <hr class="section-sep">
  <div class="section-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Conversation notes
  </div>
  <textarea class="notes-field" id="notes-field" placeholder="What did you talk about? Any key takeaways, promises, or context…"></textarea>

  <div style="margin-top:10px;">
    <div class="cal-label" style="margin-bottom:7px;">Email length</div>
    <div class="invite-options">
      <button class="invite-chip" data-para="1" onclick="setParaCount(1)">1 paragraph</button>
      <button class="invite-chip" data-para="2" onclick="setParaCount(2)">2 paragraphs</button>
      <button class="invite-chip active" data-para="3" onclick="setParaCount(3)">3 paragraphs</button>
      <button class="invite-chip" data-para="4" onclick="setParaCount(4)">4 paragraphs</button>
    </div>
  </div>

  <button class="action-btn wide highlight" id="gen-email-btn" onclick="generateEmailDraft()" style="margin-top:10px;">✨ Generate follow-up email draft</button>

  <!-- Calendar / Follow-up -->
  <hr class="section-sep">
  <div class="section-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Follow-up reminder
  </div>
  <div class="cal-row">
    <div class="cal-field">
      <div class="cal-label">Date</div>
      <input type="date" id="cal-date">
    </div>
    <div class="cal-field">
      <div class="cal-label">Time</div>
      <input type="time" id="cal-time" value="13:00">
    </div>
  </div>

  <div style="margin-top:12px;">
    <div class="cal-label" style="margin-bottom:8px;">Send calendar invite to</div>
    <div class="invite-options">
      <button class="invite-chip active" data-invite="email" onclick="setInvite('email')">Contact's email</button>
      <button class="invite-chip" data-invite="phone" onclick="setInvite('phone')">Contact's phone</button>
      <button class="invite-chip" data-invite="none" onclick="setInvite('none')">No invite</button>
    </div>
  </div>

  <button class="action-btn wide primary" id="cal-btn" onclick="createCalendarEvent()" style="margin-top:12px;">
    📅 Add to calendar
  </button>
</div>

<button class="reset-btn" id="reset-btn" onclick="reset()">Scan another card</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://bcsv2-production.up.railway.app';
let currentData = null;
let pendingQRText = null;
let pendingBase64 = null;
let pendingMediaType = null;
let selectedInvite = 'email';
let selectedParaCount = 3;
let emailDraftText = '';

const preview = document.getElementById('preview');
const scanBtn = document.getElementById('scan-btn');
const status = document.getElementById('status');
const resultCard = document.getElementById('result-card');
const resetBtn = document.getElementById('reset-btn');
const errorMsg = document.getElementById('error-msg');
const uploadArea = document.getElementById('upload-area');
const qrModal = document.getElementById('qr-modal');
let selectedFile = null;

// Set default date to tomorrow
function setDefaultDate() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  const iso = d.toISOString().split('T')[0];
  document.getElementById('cal-date').value = iso;
}

function setInvite(val) {
  selectedInvite = val;
  document.querySelectorAll('.invite-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.invite === val);
  });
}

function setParaCount(n) {
  selectedParaCount = n;
  document.querySelectorAll('[data-para]').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.para) === n);
  });
}

document.getElementById('modal-use-qr').addEventListener('click', () => {
  hideModal();
  if (!pendingQRText) return;
  const parsed = parseQRText(pendingQRText);
  if (parsed) { currentData = parsed; showResult(parsed); }
  else showError('Could not extract contact info from QR code.');
  scanBtn.disabled = false;
});

document.getElementById('modal-use-text').addEventListener('click', async () => {
  hideModal();
  await scanViaAPI(pendingBase64, pendingMediaType);
  scanBtn.disabled = false;
});

document.getElementById('modal-cancel').addEventListener('click', () => {
  hideModal();
  status.textContent = '';
  scanBtn.disabled = false;
});

function showModal() { qrModal.classList.remove('hidden'); }
function hideModal() { qrModal.classList.add('hidden'); }

function handleFileSelect(file) {
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadArea.style.display = 'none';
      scanBtn.style.display = 'block';
      status.textContent = 'Ready to scan';
      errorMsg.style.display = 'none';
      resultCard.style.display = 'none';
      resetBtn.style.display = 'none';
    };
    img.onerror = () => { status.textContent = 'Could not load image, try again.'; };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('file-camera').addEventListener('change', e => handleFileSelect(e.target.files[0]));
document.getElementById('file-library').addEventListener('change', e => handleFileSelect(e.target.files[0]));

function compressImage(file, maxWidth = 1200) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const scale = Math.min(1, maxWidth / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        resolve({ base64: dataUrl.split(',')[1], mediaType: 'image/jpeg', canvas, scale });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function tryDecodeQR(canvas) {
  try {
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    return code ? code.data : null;
  } catch(e) { return null; }
}

function parseQRText(text) {
  const result = { name: '', title: '', company: '', email: '', phone: '', website: '' };
  if (text.startsWith('BEGIN:VCARD')) {
    text.split(/\r?\n/).forEach(line => {
      if (line.startsWith('FN:')) result.name = line.slice(3);
      else if (line.startsWith('ORG:')) result.company = line.slice(4);
      else if (line.startsWith('TITLE:')) result.title = line.slice(6);
      else if (line.startsWith('EMAIL')) result.email = line.split(':').slice(1).join(':');
      else if (line.startsWith('TEL')) result.phone = line.split(':').slice(1).join(':');
      else if (line.startsWith('URL')) result.website = line.split(':').slice(1).join(':');
    });
    return result;
  }
  if (text.startsWith('http')) { result.website = text; return result; }
  return null;
}

async function scanViaAPI(base64, mediaType) {
  status.textContent = 'Scanning…';
  try {
    const res = await fetch(`${API}/read-card`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ base64, mediaType })
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    currentData = data;
    showResult(data);
  } catch (err) {
    showError('Error: ' + err.message);
  }
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
  status.textContent = '';
}

scanBtn.addEventListener('click', async () => {
  const file = selectedFile;
  if (!file) return;
  scanBtn.disabled = true;
  status.textContent = 'Compressing image…';
  errorMsg.style.display = 'none';
  try {
    const { base64, mediaType, canvas } = await compressImage(file);
    pendingBase64 = base64;
    pendingMediaType = mediaType;
    const qrText = tryDecodeQR(canvas);
    if (qrText) {
      pendingQRText = qrText;
      status.textContent = '';
      showModal();
      return;
    }
    await scanViaAPI(base64, mediaType);
  } catch (err) {
    showError('Error: ' + err.message);
  } finally {
    if (qrModal.classList.contains('hidden')) scanBtn.disabled = false;
  }
});

function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

function showResult(d) {
  status.textContent = '';
  scanBtn.style.display = 'none';
  document.getElementById('avatar').textContent = initials(d.name);
  document.getElementById('res-name').textContent = d.name || '—';
  document.getElementById('res-title').textContent = d.title || '';
  document.getElementById('res-company').textContent = d.company || '';

  const fields = [];
  if (d.email) fields.push({ label: 'Email', value: `<a href="mailto:${d.email}">${d.email}</a>` });
  if (d.phone) fields.push({ label: 'Phone', value: `<a href="tel:${d.phone}">${d.phone}</a>` });
  if (d.website) {
    const url = d.website.startsWith('http') ? d.website : 'https://' + d.website;
    fields.push({ label: 'Website', value: `<a href="${url}" target="_blank">${d.website}</a>` });
  }

  document.getElementById('fields').innerHTML = fields.map(f =>
    `<div class="field-row"><span class="field-label">${f.label}</span><span class="field-value">${f.value}</span></div>`
  ).join('');

  // Update invite chip availability based on what contact info exists
  const emailChip = document.querySelector('[data-invite="email"]');
  const phoneChip = document.querySelector('[data-invite="phone"]');
  if (!d.email) {
    emailChip.style.display = 'none';
    if (d.phone) setInvite('phone');
    else setInvite('none');
  } else {
    emailChip.style.display = '';
    setInvite('email');
  }
  if (!d.phone) phoneChip.style.display = 'none';
  else phoneChip.style.display = '';

  setDefaultDate();
  resultCard.style.display = 'flex';
  resultCard.style.flexDirection = 'column';
  resetBtn.style.display = 'block';
}

/* ─── Calendar ─────────────────────────────────────── */
function createCalendarEvent() {
  if (!currentData) return;
  const name = currentData.name || 'Contact';
  const title = `Follow up with ${name}`;
  const dateVal = document.getElementById('cal-date').value;
  const timeVal = document.getElementById('cal-time').value || '13:00';

  if (!dateVal) { showToast('Please pick a date first'); return; }

  // Build start/end ISO strings (1 hour duration)
  const start = new Date(`${dateVal}T${timeVal}:00`);
  const end = new Date(start.getTime() + 60 * 60 * 1000);

  const fmt = d => d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
  const startStr = fmt(start);
  const endStr = fmt(end);

  const notes = document.getElementById('notes-field').value.trim();
  let description = notes ? `Conversation notes:\n${notes}` : '';
  if (emailDraftText) description += (description ? '\n\n' : '') + `Suggested follow-up email:\n${emailDraftText}`;

  // Determine attendee for invite
  let attendee = '';
  if (selectedInvite === 'email' && currentData.email) {
    attendee = `\nATTENDEE;RSVP=TRUE:mailto:${currentData.email}`;
  } else if (selectedInvite === 'phone' && currentData.phone) {
    // SMS invite hint in description
    description += `\n\nInvite SMS to: ${currentData.phone}`;
  }

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Card Scanner//EN',
    'BEGIN:VEVENT',
    `DTSTART:${startStr}`,
    `DTEND:${endStr}`,
    `SUMMARY:${title}`,
    description ? `DESCRIPTION:${description.replace(/\n/g, '\\n')}` : '',
    attendee,
    'END:VEVENT',
    'END:VCALENDAR'
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${title.replace(/\s+/g, '_')}.ics`;
  a.click();
  URL.revokeObjectURL(url);

  // Visual feedback
  const btn = document.getElementById('cal-btn');
  btn.textContent = '✅ Calendar event saved';
  btn.classList.remove('primary');
  btn.classList.add('cal-created');
  showToast('Calendar event downloaded');
}

/* ─── Email Draft ───────────────────────────────────── */
async function generateEmailDraft() {
  const notes = document.getElementById('notes-field').value.trim();
  const btn = document.getElementById('gen-email-btn');

  if (!notes) {
    showToast('Add some conversation notes first');
    return;
  }

  const d = currentData || {};
  const firstName = (d.name || '').split(' ')[0] || 'there';

  btn.disabled = true;
  btn.innerHTML = '<span class="dot-spin"></span> Generating…';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Write a warm, professional follow-up email draft.

Contact info:
- Name: ${d.name || 'Unknown'}
- Title: ${d.title || ''}
- Company: ${d.company || ''}

My conversation notes:
${notes}

Instructions:
- Address them by first name (${firstName})
- Reference the conversation naturally
- Write EXACTLY ${selectedParaCount} paragraph${selectedParaCount > 1 ? 's' : ''} — no more, no fewer
- End with a clear next step${selectedParaCount === 1 ? ' (work it into the single paragraph)' : ''}
- Don't use excessive pleasantries or filler
- Sign off as "Best," then leave a blank line for my name
- Output ONLY the email body, no subject line, no explanation`
        }]
      })
    });

    const data = await res.json();
    emailDraftText = (data.content || []).map(b => b.text || '').join('').trim();
    document.getElementById('email-draft-content').textContent = emailDraftText;
    document.getElementById('email-modal').classList.remove('hidden');
  } catch (err) {
    showToast('Could not generate email: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ Generate follow-up email draft';
  }
}

function copyEmailDraft() {
  if (!emailDraftText) return;
  navigator.clipboard.writeText(emailDraftText);
  showToast('Email draft copied!');
}

/* ─── Misc ──────────────────────────────────────────── */
function findOnLinkedIn() {
  if (!currentData) return;
  const query = [currentData.name, currentData.company].filter(Boolean).join(' ');
  window.open('https://www.linkedin.com/search/results/people/?keywords=' + encodeURIComponent(query), '_blank');
}

function copyContact() {
  if (!currentData) return;
  navigator.clipboard.writeText(JSON.stringify(currentData, null, 2));
  showToast('Copied to clipboard');
}

function downloadVCard() {
  if (!currentData) return;
  const d = currentData;
  const lines = [
    'BEGIN:VCARD', 'VERSION:3.0',
    `FN:${d.name || ''}`,
    d.title ? `TITLE:${d.title}` : '',
    d.company ? `ORG:${d.company}` : '',
    d.email ? `EMAIL:${d.email}` : '',
    d.phone ? `TEL:${d.phone}` : '',
    d.website ? `URL:${d.website.startsWith('http') ? d.website : 'https://' + d.website}` : '',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([lines], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${(d.name || 'contact').replace(/\s+/g, '_')}.vcf`;
  a.click(); URL.revokeObjectURL(url);
}

function reset() {
  selectedFile = null; pendingQRText = null; pendingBase64 = null; pendingMediaType = null;
  emailDraftText = '';
  selectedParaCount = 3;
  document.querySelectorAll('[data-para]').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.para) === 3);
  });
  document.getElementById('file-camera').value = '';
  document.getElementById('file-library').value = '';
  document.getElementById('notes-field').value = '';
  document.getElementById('gen-email-btn').innerHTML = '✨ Generate follow-up email draft';
  document.getElementById('gen-email-btn').disabled = false;
  const calBtn = document.getElementById('cal-btn');
  calBtn.textContent = '📅 Add to calendar';
  calBtn.classList.add('primary'); calBtn.classList.remove('cal-created');
  preview.style.display = 'none';
  uploadArea.style.display = 'flex';
  scanBtn.style.display = 'none';
  resultCard.style.display = 'none';
  resetBtn.style.display = 'none';
  errorMsg.style.display = 'none';
  status.textContent = '';
  currentData = null;
  setInvite('email');
}

function showToast(msg, duration = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}
</script>
